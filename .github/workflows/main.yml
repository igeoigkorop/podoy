name: Twitch Stealth Viewer (Brave + WARP) - Production Ready

on:
  schedule:
    - cron: "*/5 * * * *"          # Every 5 minutes (as you requested)
  workflow_dispatch:               # Manual trigger support

jobs:
  run-viewer:
    name: Run Twitch Viewer with Brave (Ubuntu)
    env:
      PY_COLORS: "1"
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.13"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20                # Safety limit per run

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    # ==================== SYSTEM DEPENDENCIES (required for XVFB + Brave) ====================
    - name: Install system dependencies
      run: |
        echo "Installing system packages (tzdata, locales, xvfb, curl...)"
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          tzdata \
          locales \
          xvfb \
          curl \
          gnupg
      shell: bash

    # ==================== CLOUDFLARE WARP (your original proxy layer) ====================
    - name: Install Cloudflare WARP
      run: |
        echo "Setting up Cloudflare WARP..."
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        sudo apt-get update && sudo apt-get install -y --no-install-recommends cloudflare-warp
        sudo warp-cli --accept-tos registration new
        sudo warp-cli --accept-tos mode warp+doh
        sudo warp-cli --accept-tos connect
        sleep 8
      shell: bash

    - name: Verify WARP connection (fails job if not connected)
      run: |
        echo "Checking WARP connection..."
        if curl -s https://www.cloudflare.com/cdn-cgi/trace | grep -q "warp=on"; then
          echo "✅ WARP connected successfully"
        else
          echo "❌ WARP connection failed!"
          exit 1
        fi
      shell: bash

    # ==================== LOCALE SETUP ====================
    - name: Set Locale (en_US.UTF-8)
      run: |
        echo "Setting up locale..."
        sudo locale-gen en_US.UTF-8
        sudo localectl set-locale LANG="en_US.UTF-8"
        export LANG="en_US.UTF-8"
        sudo update-locale
        locale
      shell: bash

    # ==================== PYTHON DEPENDENCIES ====================
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip wheel
        pip install --upgrade seleniumbase pyautogui pymongo python-xlib
      shell: bash

    # ==================== BRAVE BROWSER (NEW PRODUCTION STEP) ====================
    - name: Install Brave Browser (official 2026 method)
      run: |
        echo "Installing latest Brave Browser..."
        sudo curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
        sudo curl -fsSLo /etc/apt/sources.list.d/brave-browser-release.sources https://brave-browser-apt-release.s3.brave.com/brave-browser.sources
        sudo apt-get update
        sudo apt-get install -y brave-browser
        echo "✅ Brave installed: $(brave-browser --version)"
      shell: bash

    # ==================== CHROMEDRIVER (SeleniumBase needs it for Brave) ====================
    - name: Install ChromeDriver via SeleniumBase
      run: |
        seleniumbase install chromedriver
      shell: bash

    # ==================== RUN THE VIEWER SCRIPT ====================
    - name: Run pax.py (Brave + Stealth + XVFB)
      run: |
        echo "Starting viewer with Brave..."
        python pax.py \
          --brave \
          --incognito \
          --do-not-track \
          --xvfb \
          --screenshot \
          --debug
      shell: bash


